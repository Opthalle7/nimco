<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Valentine - Stop Messing With Me Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ff6b8b 0%, #ff4d6d 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            position: relative;
            overflow-x: hidden;
        }
        .screen {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 20px 15px;
            position: relative;
        }
        h1 {
            font-size: clamp(1.8rem, 8vw, 2.5rem);
            color: white;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            word-break: keep-all;
        }
        .question {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            margin: 20px 0 30px;
            font-weight: bold;
            background: rgba(255,255,255,0.9);
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
            color: #c44569;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 90%;
            word-break: break-word;
        }
        .buttons-area {
            position: relative;
            min-height: 300px;
            width: 100%;
            border-radius: 40px;
            overflow: visible;
            margin: 10px 0;
        }
        .yes-btn {
            background-color: #ff4d6d;
            color: white;
            font-size: clamp(1.3rem, 6vw, 2rem);
            font-weight: bold;
            padding: 12px 25px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 0 #b0003a;
            min-width: 110px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            white-space: nowrap;
        }
        .no-btn {
            background-color: #6c757d;
            color: white;
            font-size: clamp(1.3rem, 6vw, 2rem);
            font-weight: bold;
            padding: 12px 25px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 6px 0 #3a3f44;
            min-width: 110px;
            position: absolute;
            z-index: 10;
            white-space: nowrap;
        }
        .yes-btn:active {
            transform: translate(-50%, -50%) translateY(3px);
            box-shadow: 0 3px 0 #b0003a;
        }
        
        /* TIRINTA WAA LA QARIYAY */
        .counter {
            display: none;
        }
        
        /* QAYBTA XARIIJINTA MADOW (FOOTER) WAA LA QARIYAY */
        footer {
            display: none;
        }
        
        /* QAYBTA SAWIRKA SOO GELINTA WAA LA QARIYAY */
        .upload-area {
            display: none;
        }
        
        .final-screen {
            text-align: center;
            padding: 15px;
        }
        .final-image {
            max-width: 100%;
            max-height: 50vh;
            width: auto;
            height: auto;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: bounce 0.5s ease;
            margin: 15px 0;
            object-fit: contain;
        }
        .final-text {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: bold;
            color: white;
            margin-top: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: rgba(0,0,0,0.5);
            display: inline-block;
            padding: 8px 18px;
            border-radius: 50px;
            animation: bounce 0.5s ease;
            word-break: break-word;
            max-width: 90%;
        }
        @keyframes bounce {
            0% { transform: scale(0.8); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        .reset-btn {
            margin-top: 25px;
            background: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            color: #ff4d6d;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px 10px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .reset-btn:active {
            transform: scale(0.97);
        }
        
        /* Mobile-ka yar */
        @media (max-width: 480px) {
            .screen {
                padding: 15px 10px;
            }
            .buttons-area {
                min-height: 250px;
            }
            .yes-btn, .no-btn {
                padding: 10px 20px;
                min-width: 90px;
            }
            .question {
                padding: 10px 16px;
            }
        }
        
        /* Taleefanno aad u yar (iPhone SE iyo wixii la mid ah) */
        @media (max-width: 380px) {
            .yes-btn, .no-btn {
                padding: 8px 16px;
                min-width: 80px;
                font-size: 1.1rem;
            }
            .buttons-area {
                min-height: 220px;
            }
            .question {
                font-size: 1rem;
            }
        }
        
        /* Touch optimization */
        @media (hover: none) and (pointer: coarse) {
            .yes-btn, .no-btn {
                cursor: default;
            }
        }
    </style>
</head>
<body>
<div class="screen" id="appScreen">
    <h1>Qanjoos</h1>
    <div class="question" id="questionText">will you be my</div>
    
    <div class="buttons-area" id="buttonsArea">
        <button class="yes-btn" id="yesBtn">Yes 💖</button>
        <button class="no-btn" id="noBtn">No 😅</button>
    </div>
    
    <div class="counter" id="tapCounter">👆 Tirada No: 0 / 7</div>
    
    <div class="upload-area">
        <label class="upload-label">
            📸 Sawirka "Stop messing with me" ku soo rar
            <input type="file" id="imageUpload" accept="image/*">
        </label>
    </div>
    
    <footer>Developed by: Abdulahi abdi omer</footer>
</div>

<script>
    let tapCount = 0;
    const MAX_TAPS = 7;
    let noButton = document.getElementById("noBtn");
    let yesButton = document.getElementById("yesBtn");
    let buttonsArea = document.getElementById("buttonsArea");
    let questionEl = document.getElementById("questionText");
    let counterEl = document.getElementById("tapCounter");
    
    // ==============================================
    // SAWIRKAAGA HALKAN KU DAR
    // ==============================================
    const customImage = "g.jpeg";
    // ==============================================
    
    // Qoraalada su'aasha
    const questions = [
        "Nimco maa ii noqonaysaa? 😍",
        "joog nimcooy 😍",
        "dhiiqahaa lugaha laguu galinyaa 🥺",
        "nimco qurux 🥰",
    ];
    
    let questionIndex = 0;
    
    // No wuxuu u boodaa meelo fog fog oo kala duwan - mobile responsive
    function moveNoButtonFarAway() {
        const areaRect = buttonsArea.getBoundingClientRect();
        const btnRect = noButton.getBoundingClientRect();
        const yesRect = yesButton.getBoundingClientRect();
        
        // Xisaabinta xadka mobile-ka si ku habboon
        const maxLeft = Math.max(0, areaRect.width - btnRect.width - 15);
        const maxTop = Math.max(0, areaRect.height - btnRect.height - 15);
        
        let randomLeft, randomTop;
        let safe = false;
        let attempts = 0;
        
        while (!safe && attempts < 50) {
            randomLeft = Math.random() * maxLeft;
            randomTop = Math.random() * maxTop;
            
            const yesCenterX = yesRect.left + yesRect.width / 2;
            const yesCenterY = yesRect.top + yesRect.height / 2;
            const noCenterX = areaRect.left + randomLeft + btnRect.width / 2;
            const noCenterY = areaRect.top + randomTop + btnRect.height / 2;
            const distance = Math.sqrt(
                Math.pow(noCenterX - yesCenterX, 2) + 
                Math.pow(noCenterY - yesCenterY, 2)
            );
            
            // Mobile-ka masaafada yar la dhig (100px)
            const minDistance = window.innerWidth < 480 ? 100 : 150;
            if (distance > minDistance) {
                safe = true;
            }
            attempts++;
        }
        
        if (!safe) {
            const corners = [
                { left: 5, top: 5 },
                { left: maxLeft, top: 5 },
                { left: 5, top: maxTop },
                { left: maxLeft, top: maxTop }
            ];
            const farCorner = corners[Math.floor(Math.random() * corners.length)];
            randomLeft = farCorner.left;
            randomTop = farCorner.top;
        }
        
        noButton.style.position = "absolute";
        noButton.style.left = randomLeft + "px";
        noButton.style.top = randomTop + "px";
        noButton.style.right = "auto";
        noButton.style.bottom = "auto";
        
        noButton.style.transform = "scale(0.9) rotate(2deg)";
        setTimeout(() => {
            if (tapCount < MAX_TAPS) {
                noButton.style.transform = "scale(1) rotate(0deg)";
            }
        }, 120);
    }
    
    // Sawirka + QORAAL soo baxaya marka la gaaro 7
    function showFinalImage() {
        const appScreen = document.getElementById("appScreen");
        
        const imageHTML = customImage 
            ? `<div>
                   <img src="${customImage}" class="final-image" alt="Final Image" loading="lazy">
                   <div class="final-text">🛑 yeyna igaga kaa fakan 😂🛑</div>
               </div>`
            : `<div class="final-text" style="font-size: clamp(1.2rem, 5vw, 2rem); padding: 30px 20px; background: rgba(255,255,255,0.9); border-radius: 48px; color: #c0392b;">
                   🛑 yeyna igaga kaa fakan 😂🛑
               </div>`;
        
        appScreen.innerHTML = `
            <div class="final-screen">
                ${imageHTML}
                <button class="reset-btn" id="resetBtn">🔄 Dib u bilow</button>
            </div>
        `;
        
        const resetBtn = document.getElementById("resetBtn");
        if (resetBtn) {
            resetBtn.addEventListener("click", (e) => {
                e.preventDefault();
                location.reload();
            });
        }
    }
    
    // TIRINTA (waa la qariyay laakiin way socotaa gudaha)
    function handleNoAction(event) {
        if (tapCount >= MAX_TAPS) return;
        
        event.preventDefault();
        event.stopPropagation();
        
        tapCount++;
        
        if (questionIndex < questions.length - 1) {
            questionIndex++;
        } else {
            questionIndex = (questionIndex + 1) % questions.length;
        }
        questionEl.innerText = questions[questionIndex];
        
        noButton.style.animation = "pop 0.1s ease";
        setTimeout(() => {
            noButton.style.animation = "";
        }, 100);
        
        moveNoButtonFarAway();
        
        if (tapCount === MAX_TAPS) {
            showFinalImage();
            return;
        }
    }
    
    // YES: waxba ma tirinayo
    function handleYesClick() {
        yesButton.style.transform = "translate(-50%, -50%) translateY(3px)";
        setTimeout(() => {
            yesButton.style.transform = "translate(-50%, -50%) translateY(0)";
        }, 100);
        
        if (noButton && tapCount < MAX_TAPS) {
            noButton.style.animation = "shake 0.12s ease";
            setTimeout(() => {
                noButton.style.animation = "";
            }, 150);
        }
    }
    
    // Dhageyso dhacdooyinka - mobile touch optimization
    noButton.addEventListener("mouseenter", handleNoAction);
    noButton.addEventListener("click", handleNoAction);
    noButton.addEventListener("touchstart", handleNoAction, { passive: false });
    yesButton.addEventListener("click", handleYesClick);
    yesButton.addEventListener("touchstart", handleYesClick, { passive: false });
    
    // Bilowga
    function initNoPosition() {
        setTimeout(() => {
            moveNoButtonFarAway();
        }, 150);
    }
    initNoPosition();
    
    // Mobile orientation change
    window.addEventListener("resize", () => {
        if (tapCount < MAX_TAPS && noButton) {
            setTimeout(() => {
                moveNoButtonFarAway();
            }, 100);
        }
    });
    
    window.addEventListener("orientationchange", () => {
        setTimeout(() => {
            if (tapCount < MAX_TAPS && noButton) {
                moveNoButtonFarAway();
            }
        }, 100);
    });
</script>
</body>
</html>
